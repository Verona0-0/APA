# Локальный MinIO для хранения обложек публикаций.
# Поднять:  docker compose up -d
# Консоль:  http://localhost:9001  (логин/пароль из переменных ниже)
services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API — сюда ходит наш бэкенд
      - "9001:9001"   # веб-консоль для просмотра бакетов
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

volumes:
  minio-data:
